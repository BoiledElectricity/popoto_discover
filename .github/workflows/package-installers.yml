name: Package installers

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux AppImage and deb
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            dpkg-dev \
            fakeroot \
            file \
            libfuse2

      - name: Build Linux packages
        run: ./gradlew --no-daemon clean packageHost

      - name: List Linux artifacts
        run: |
          find build/jpackage/artifacts build/jpackage/installer -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popoto-discover-linux
          if-no-files-found: error
          path: |
            build/jpackage/artifacts/*.AppImage
            build/jpackage/installer/*.deb

  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build macOS package
        run: ./gradlew --no-daemon clean packageHost

      - name: List macOS artifacts
        run: |
          find build/jpackage/installer -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popoto-discover-macos
          if-no-files-found: error
          path: build/jpackage/installer/*.dmg

  windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          choco install imagemagick --no-progress -y
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (Test-Path $wixBin) {
            $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          $magick = Get-Command magick.exe -ErrorAction SilentlyContinue
          if ($magick) {
            Split-Path $magick.Source | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Restore bundled Npcap OEM installer
        id: npcap
        shell: pwsh
        env:
          NPCAP_OEM_INSTALLER_B64: ${{ secrets.NPCAP_OEM_INSTALLER_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NPCAP_OEM_INSTALLER_B64)) {
            "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "::notice::NPCAP_OEM_INSTALLER_B64 is not set; skipping Windows MSI so we do not publish a non-self-contained installer."
            exit 0
          }
          New-Item -ItemType Directory -Force packaging\windows | Out-Null
          [IO.File]::WriteAllBytes(
            "packaging\windows\npcap-oem.exe",
            [Convert]::FromBase64String($env:NPCAP_OEM_INSTALLER_B64)
          )
          "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows package
        if: steps.npcap.outputs.available == 'true'
        shell: pwsh
        run: .\gradlew.bat --no-daemon clean packageHost -PrequireBundledNpcap=true

      - name: List Windows artifacts
        if: steps.npcap.outputs.available == 'true'
        shell: pwsh
        run: Get-ChildItem build\jpackage\installer | Format-List FullName,Length

      - name: Upload Windows artifacts
        if: steps.npcap.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: popoto-discover-windows
          if-no-files-found: error
          path: build/jpackage/installer/*.msi

      - name: Skip Windows artifact notice
        if: steps.npcap.outputs.available != 'true'
        shell: pwsh
        run: |
          Write-Host "Windows MSI skipped because NPCAP_OEM_INSTALLER_B64 is not configured."
          Write-Host "Set that secret to the base64 contents of the approved Npcap OEM installer to build the self-contained Windows package."
