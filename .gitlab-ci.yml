stages:
  - verify
  - mirror
  - package

variables:
  GIT_DEPTH: "0"
  GITHUB_MIRROR_REPO: BoiledElectricity/popoto_discover
  POPOTO_DISCOVER_CI_IMAGE: registry.popotomodem.com/delresearch/popoto_discover

verify-host:
  stage: verify
  tags:
    - linux/amd64
  image:
    name: $POPOTO_DISCOVER_CI_IMAGE
    pull_policy: if-not-present
  script:
    - ./gradlew --no-daemon test shadowJar
    - python3 -m py_compile common/protocol.py host/popoto_discover.py host/popoto_discover_gui.py client/popoto_discover_client.py
  artifacts:
    when: on_success
    expire_in: "30 days"
    paths:
      - build/libs/popoto-discover-*.jar
  rules:
    - when: always

mirror-github:
  stage: mirror
  tags:
    - linux/amd64
  image:
    name: alpine:3.20
    pull_policy: if-not-present
  needs:
    - job: verify-host
      artifacts: false
  resource_group: github-mirror
  before_script:
    - apk add --no-cache bash ca-certificates coreutils git
  script:
    - |
      set -euo pipefail
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN is not set; skipping GitHub mirror push."
        exit 0
      fi

      git remote remove github 2>/dev/null || true
      git remote add github "https://github.com/${GITHUB_MIRROR_REPO}.git"

      auth="$(printf 'x-access-token:%s' "$GITHUB_MIRROR_TOKEN" | base64 | tr -d '\n')"
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: Basic ${auth}" \
          push --force github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
      else
        git -c "http.https://github.com/.extraheader=AUTHORIZATION: Basic ${auth}" \
          push --force github "HEAD:refs/heads/${CI_COMMIT_REF_NAME}"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'

fetch-github-installers:
  stage: package
  tags:
    - linux/amd64
  image:
    name: alpine:3.20
    pull_policy: if-not-present
  needs:
    - job: mirror-github
      artifacts: false
  before_script:
    - apk add --no-cache bash ca-certificates coreutils curl jq unzip
  script:
    - |
      set -euo pipefail

      token="${GITHUB_ARTIFACT_TOKEN:-${GITHUB_MIRROR_TOKEN:-}}"
      if [ -z "$token" ]; then
        echo "GITHUB_ARTIFACT_TOKEN/GITHUB_MIRROR_TOKEN is not set; skipping GitHub artifact fetch."
        mkdir -p github-artifacts
        printf '{"skipped":true,"reason":"missing GitHub artifact token"}\n' > github-artifacts/manifest.json
        exit 0
      fi

      repo="${GITHUB_MIRROR_REPO}"
      workflow="${GITHUB_PACKAGE_WORKFLOW:-package-installers.yml}"
      api_root="https://api.github.com/repos/${repo}"
      auth_header="Authorization: Bearer ${token}"
      accept_header="Accept: application/vnd.github+json"
      version_header="X-GitHub-Api-Version: 2022-11-28"

      api_get() {
        curl --fail --silent --show-error --location \
          -H "$accept_header" \
          -H "$version_header" \
          -H "$auth_header" \
          "$1"
      }

      echo "Waiting for GitHub Actions workflow '${workflow}' for commit ${CI_COMMIT_SHA} in ${repo}."
      deadline=$(( $(date +%s) + 3600 ))
      run_id=""
      while [ "$(date +%s)" -lt "$deadline" ]; do
        runs_json="$(api_get "${api_root}/actions/workflows/${workflow}/runs?head_sha=${CI_COMMIT_SHA}&per_page=20")"
        run_id="$(printf '%s' "$runs_json" | jq -r '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty')"
        if [ -n "$run_id" ]; then
          break
        fi
        echo "No GitHub Actions run visible yet; waiting..."
        sleep 15
      done

      if [ -z "$run_id" ]; then
        echo "Timed out waiting for GitHub Actions run for ${CI_COMMIT_SHA}."
        exit 1
      fi

      echo "Found GitHub Actions run ${run_id}."
      while [ "$(date +%s)" -lt "$deadline" ]; do
        run_json="$(api_get "${api_root}/actions/runs/${run_id}")"
        status="$(printf '%s' "$run_json" | jq -r '.status')"
        conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion // empty')"
        run_url="$(printf '%s' "$run_json" | jq -r '.html_url')"
        echo "GitHub run ${run_id}: status=${status} conclusion=${conclusion:-pending}"

        if [ "$status" = "completed" ]; then
          if [ "$conclusion" != "success" ]; then
            echo "GitHub packaging failed: ${run_url}"
            exit 1
          fi
          break
        fi
        sleep 20
      done

      if [ "${status:-}" != "completed" ]; then
        echo "Timed out waiting for GitHub Actions run ${run_id} to complete."
        exit 1
      fi

      mkdir -p github-artifacts .github-artifact-zips
      artifacts_json="$(api_get "${api_root}/actions/runs/${run_id}/artifacts?per_page=100")"
      artifact_count="$(printf '%s' "$artifacts_json" | jq '[.artifacts[] | select(.expired == false)] | length')"
      if [ "$artifact_count" -eq 0 ]; then
        echo "GitHub run ${run_id} completed successfully but produced no downloadable artifacts."
        exit 1
      fi

      printf '%s' "$artifacts_json" |
        jq -r '.artifacts[] | select(.expired == false) | [.id, .name] | @tsv' |
        while IFS="$(printf '\t')" read -r artifact_id artifact_name; do
          echo "Downloading GitHub artifact ${artifact_name} (${artifact_id})."
          zip_path=".github-artifact-zips/${artifact_name}.zip"
          curl --fail --silent --show-error --location \
            -H "$accept_header" \
            -H "$version_header" \
            -H "$auth_header" \
            -o "$zip_path" \
            "${api_root}/actions/artifacts/${artifact_id}/zip"
          mkdir -p "github-artifacts/${artifact_name}"
          unzip -q "$zip_path" -d "github-artifacts/${artifact_name}"
        done

      cat > github-artifacts/manifest.json <<EOF
      {
        "github_repository": "${repo}",
        "github_workflow": "${workflow}",
        "github_run_id": ${run_id},
        "github_run_url": "${run_url}",
        "commit_sha": "${CI_COMMIT_SHA}",
        "gitlab_pipeline_url": "${CI_PIPELINE_URL}"
      }
      EOF

      find github-artifacts -maxdepth 3 -type f -print | sort
  artifacts:
    when: on_success
    expire_in: "30 days"
    paths:
      - github-artifacts/
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'
